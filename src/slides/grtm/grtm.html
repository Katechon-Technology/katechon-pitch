<div class="grtm-frame">
  <div class="grtm-corner tl"></div>
  <div class="grtm-corner tr"></div>
  <div class="grtm-corner bl"></div>
  <div class="grtm-corner br"></div>

  <video id="seedance-video"
         src="/assets/grtm.mp4"
         playsinline
         preload="auto"
         autoplay
         muted
         loop></video>

  <div class="grtm-scanlines"></div>

  <div class="grtm-tap" id="grtmTap"></div>

  <button class="grtm-unmute-pill" id="grtmUnmute">
    <svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
    tap to unmute
  </button>

  <div class="grtm-prog-bar">
    <div class="grtm-prog-fill" id="grtmProgFill"></div>
  </div>
</div>
