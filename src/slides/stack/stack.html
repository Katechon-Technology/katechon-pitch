<div class="stack-label">THE STACK</div>

<div class="stack-3d">
  <div class="stack-scene">

    <div class="stack-plane" data-layer="simulation">
      <div class="plane-frame"></div>
      <div class="plane-paint sim-paint"></div>
      <div class="plane-label"><span>Simulation</span></div>
      <div class="hot-cell" style="--x: 120px; --y: 80px;  --beat: 1s;"></div>
      <div class="hot-cell" style="--x: 340px; --y: 210px; --beat: 2s;"></div>
      <div class="hot-cell" style="--x: 490px; --y: 110px; --beat: 3s;"></div>
    </div>

    <div class="stack-plane" data-layer="render">
      <div class="plane-frame"></div>
      <div class="plane-paint render-paint"></div>
      <div class="plane-label"><span>Render</span></div>
      <div class="hot-cell hot" style="--x: 120px; --y: 80px;  --beat: 1.3s;"></div>
      <div class="hot-cell hot" style="--x: 340px; --y: 210px; --beat: 2.3s;"></div>
      <div class="hot-cell hot" style="--x: 490px; --y: 110px; --beat: 3.3s;"></div>
    </div>

    <div class="stack-plane" data-layer="stream">
      <div class="plane-frame"></div>
      <div class="plane-label"><span>Stream</span></div>
      <div class="flow-bar" style="--x: 120px; --y: 80px;  --beat: 1.6s;"></div>
      <div class="flow-bar" style="--x: 340px; --y: 210px; --beat: 2.6s;"></div>
      <div class="flow-bar" style="--x: 490px; --y: 110px; --beat: 3.6s;"></div>
    </div>

    <div class="stack-plane" data-layer="viewers">
      <div class="plane-frame"></div>
      <div class="plane-paint viewers-paint"></div>
      <div class="plane-label"><span>Viewers</span></div>
      <div class="viewer-dot" style="--x: 120px; --y: 80px;  --beat: 1.9s;"></div>
      <div class="viewer-dot" style="--x: 340px; --y: 210px; --beat: 2.9s;"></div>
      <div class="viewer-dot" style="--x: 490px; --y: 110px; --beat: 3.9s;"></div>
    </div>

    <div class="beam" style="--bx: 120px; --by: 80px;  --beat: 1s;"></div>
    <div class="beam" style="--bx: 340px; --by: 210px; --beat: 2s;"></div>
    <div class="beam" style="--bx: 490px; --by: 110px; --beat: 3s;"></div>

  </div>
</div>

<div class="stack-ingredients">
  <div class="ingredient">
    <div class="ing-body">
      <div class="ing-name">Avatar</div>
      <div class="ing-tag">Voice Interface</div>
    </div>
  </div>
  <div class="ingredient">
    <div class="ing-body">
      <div class="ing-name">APIs</div>
      <div class="ing-tag">Live Data</div>
    </div>
  </div>
  <div class="ingredient">
    <div class="ing-body">
      <div class="ing-name">Polymarket &middot; Hyperliquid</div>
      <div class="ing-tag">On-chain Execution</div>
    </div>
  </div>
</div>
