<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Katechon Technology</title>
</head>
<body>

  <!-- Mobile Gate -->
  <div class="mobile-gate">
    <div class="logo">KATECHON TECHNOLOGY</div>
    <div class="video-wrap">
      <iframe
        src="https://www.youtube-nocookie.com/embed/-haMP4AnYPo?rel=0&modestbranding=1&playsinline=1"
        title="Katechon pitch"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        allowfullscreen
        referrerpolicy="strict-origin-when-cross-origin"
      ></iframe>
    </div>
  </div>

  <!-- Start Overlay -->
  <div id="start-overlay">
    <div class="overlay-prompt">Press <kbd>Space</kbd> to begin</div>
  </div>

  <!-- Stage: fixed-size design canvas (1440x900) scaled uniformly to fit the window. -->
  <div class="stage">
    <!-- Deck shell — slides are injected here by deck.js -->
    <div class="deck" id="deck-content"></div>

    <!-- Avatar Pet Mode -->
    <iframe id="avatar-pet"
      src="/avatar-pet.html"
      allow="autoplay"
    ></iframe>

    <div class="slide-counter"><span id="current">1</span> / <span id="total">1</span></div>

    <div class="nav">
      <button id="prev">&#8249;</button>
      <button id="next">&#8250;</button>
    </div>

    <div class="nav nav-left">
      <button id="avatar-toggle" title="Mute avatar and narration">Mute</button>
    </div>

    <div class="progress" id="progress"></div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
