<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Avatar Pet</title>
<style>
  * { margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="avatar-canvas"></canvas>
<script src="/libs/live2dcubismcore.min.js"></script>
<script src="/libs/live2d.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pixi.js@6.5.10/dist/browser/pixi.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display@0.4.0/dist/index.min.js"></script>
<script>
if (typeof PIXI === 'undefined' || !PIXI.live2d || !PIXI.live2d.Live2DModel) {
  console.error('[avatar] PIXI or Live2D not loaded');
} else {

const MODELS = [
  { name: 'Mao Pro',     url: '/live2d-models/mao_pro/runtime/mao_pro.model3.json',                       scale: 0.23,  yFactor: null,  lipParam: 'ParamA'          },
  { name: 'Zhongxing',  url: '/live2d-models/zhongxingshekongdlc/zhongxingshekong.model3.json',           scale: 0.755, yFactor: 1.35,  lipParam: 'ParamMouthOpenY' },
  { name: 'Grasshopper', url: '/live2d-models/Grasshopper/Grasshopper.model3.json',                       scale: 0.675, yFactor: 1.29,  lipParam: 'ParamMouthOpenY' },
];

const _p = new URLSearchParams(window.location.search);
const _modelIdx = Math.min(parseInt(_p.get('model') || '0', 10), MODELS.length - 1);
const _cfg = MODELS[_modelIdx];

// Fixed canvas size — the iframe is sized inside the deck's .stage (1440×900)
// at width:950, height:100%, so these match the rendered CSS box. Because
// the stage is scaled uniformly by the parent deck, keeping these constants
// means the avatar's position is identical on every monitor.
const W = parseInt(_p.get('w') || '950', 10);
const H = 900;

const app = new PIXI.Application({
  view: document.getElementById('avatar-canvas'),
  width: W,
  height: H,
  backgroundAlpha: 0,
  antialias: true,
});

let currentModel = null;
let currentScale = _cfg.scale;
let currentYFactor = _cfg.yFactor;

function applyTransform(scale, yFactor) {
  if (!currentModel) return;
  currentScale = scale;
  currentYFactor = yFactor;
  currentModel.scale.set(scale);
  currentModel.x = W / 2;
  currentModel.y = yFactor !== null ? H * yFactor : 1098;
}

async function loadModel() {
  const model = await PIXI.live2d.Live2DModel.from(_cfg.url, {
    autoInteract: false,
    autoUpdate: true,
  });

  currentModel = model;
  app.stage.addChild(model);

  model.anchor.set(0.5, 0.5);
  applyTransform(_cfg.scale, _cfg.yFactor);

  try {
    model.motion('Idle', 0, PIXI.live2d.MotionPriority.IDLE);
  } catch (e) {}

  // Random expression cycling — only use expressions that keep eyes open
  // exp_02 & exp_03 close eyes (ParamEyeLOpen=0), exp_06 has crossed eyeballs
  const safeExpressions = [0, 3, 4, 6, 7]; // exp_01, exp_04, exp_05, exp_07, exp_08
  setInterval(() => {
    const exp = safeExpressions[Math.floor(Math.random() * safeExpressions.length)];
    try { model.expression(exp); } catch (e) {}
  }, 8000);

  // --- Real-time lip sync via AnalyserNode (same pattern as claudetorio's _wavFileHandler) ---
  let audioCtx = null;
  let analyser = null;
  let analyserData = null;
  let currentSource = null;
  let currentMouth = 0;
  let playGen = 0; // invalidates in-flight decodeAudioData callbacks after a stop/switch
  const RMS_GAIN = 1.5; // boost factor (matches claudetorio's Math.min(1, rms * 1.5))

  function getRms() {
    if (!analyser || !currentSource) return 0;
    analyser.getByteTimeDomainData(analyserData);
    let sum = 0;
    for (let i = 0; i < analyserData.length; i++) {
      const v = (analyserData[i] - 128) / 128;
      sum += v * v;
    }
    return Math.min(1, Math.sqrt(sum / analyserData.length) * RMS_GAIN);
  }

  // Drive mouth from live audio RMS — runs right before coreModel.update()
  model.internalModel.on('beforeModelUpdate', () => {
    const target = getRms();
    const speed = target > currentMouth ? 0.7 : 0.4;
    currentMouth += (target - currentMouth) * speed;
    if (currentMouth < 0.01) currentMouth = 0;
    model.internalModel.coreModel.setParameterValueById(_cfg.lipParam, currentMouth);
  });

  function ensureAudioCtx() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 256;
      analyserData = new Uint8Array(analyser.fftSize);
      analyser.connect(audioCtx.destination);
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
  }

  function stopAudio() {
    playGen++;
    if (currentSource) {
      try { currentSource.stop(); } catch (e) {}
      currentSource = null;
    }
    currentMouth = 0;
  }

  function playPayload(payload) {
    stopAudio();
    if (!payload.audio) return;

    ensureAudioCtx();
    const myGen = playGen;

    const raw = atob(payload.audio);
    const buf = new Uint8Array(raw.length);
    for (let i = 0; i < raw.length; i++) buf[i] = raw.charCodeAt(i);

    audioCtx.decodeAudioData(buf.buffer).then(audioBuffer => {
      if (myGen !== playGen) return; // a stop/switch happened while decoding — discard
      const source = audioCtx.createBufferSource();
      source.buffer = audioBuffer;
      source.connect(analyser); // route through analyser → destination
      source.start(0);
      currentSource = source;
      source.onended = () => {
        if (currentSource === source) currentSource = null;
      };
    }).catch(err => console.error('[avatar] audio decode error:', err));
  }

  try { window.parent.postMessage({ type: 'avatar-ready', scale: currentScale, yFactor: currentYFactor }, '*'); } catch (e) {}

  // Listen for messages from parent (deck)
  window.addEventListener('message', (e) => {
    if (!e.data) return;
    if (e.data.type === 'audio') playPayload(e.data);
    if (e.data.type === 'stop') stopAudio();
    if (e.data.type === 'tune') applyTransform(e.data.scale, e.data.yFactor);
  });

  console.log('[avatar] model loaded, ready for audio payloads');
}

loadModel().catch(err => console.error('[avatar] loadModel failed:', err));

} // end PIXI guard
</script>
</body>
</html>
