<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Avatar Pet</title>
<style>
  * { margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="avatar-canvas"></canvas>
<script src="http://localhost:12393/libs/live2dcubismcore.min.js"></script>
<script src="http://localhost:12393/libs/live2d.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pixi.js@6.5.10/dist/browser/pixi.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display@0.4.0/dist/index.min.js"></script>
<script>
const VTUBER_BASE = 'http://localhost:12393';
const MODEL_URL = VTUBER_BASE + '/live2d-models/mao_pro/runtime/mao_pro.model3.json';

const W = 950;
const H = window.innerHeight;

const app = new PIXI.Application({
  view: document.getElementById('avatar-canvas'),
  width: W,
  height: H,
  backgroundAlpha: 0,
  antialias: true,
});

async function loadModel() {
  const model = await PIXI.live2d.Live2DModel.from(MODEL_URL, {
    autoInteract: false,
    autoUpdate: true,
  });

  app.stage.addChild(model);

  // Position: center horizontally, anchor at bottom so head is at top
  const scale = 0.23;
  model.scale.set(scale);
  model.anchor.set(0.5, 0.5);
  model.x = W / 2;
  model.y = H * 1.35;

  // Start idle motion
  try {
    model.motion('Idle', 0, PIXI.live2d.MotionPriority.IDLE);
  } catch (e) {}

  // Mouse tracking
  document.addEventListener('mousemove', (e) => {
    model.focus(e.clientX, e.clientY);
  });

  // Click to trigger random motion
  model.on('pointerdown', () => {
    const motionIndex = Math.floor(Math.random() * 6);
    model.motion('', motionIndex, PIXI.live2d.MotionPriority.NORMAL);
  });
  model.interactive = true;
  model.cursor = 'pointer';

  // Random expression cycling
  setInterval(() => {
    const exp = Math.floor(Math.random() * 8);
    try { model.expression(exp); } catch (e) {}
  }, 8000);
}

loadModel().catch(err => {
  console.error('Failed to load Live2D model:', err);
  document.body.innerHTML = '<div style="color:red;padding:20px">Error: ' + err.message + '</div>';
});
</script>
</body>
</html>
