<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Avatar Pet</title>
<style>
  * { margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="avatar-canvas"></canvas>
<script src="/libs/live2dcubismcore.min.js"></script>
<script src="/libs/live2d.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pixi.js@6.5.10/dist/browser/pixi.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display@0.4.0/dist/index.min.js"></script>
<script>
if (typeof PIXI === 'undefined' || !PIXI.live2d || !PIXI.live2d.Live2DModel) {
  console.error('[avatar] PIXI or Live2D not loaded');
} else {

const MODEL_URL = '/live2d-models/mao_pro/runtime/mao_pro.model3.json';
const W = 950;
const H = window.innerHeight;

const app = new PIXI.Application({
  view: document.getElementById('avatar-canvas'),
  width: W,
  height: H,
  backgroundAlpha: 0,
  antialias: true,
});

async function loadModel() {
  const model = await PIXI.live2d.Live2DModel.from(MODEL_URL, {
    autoInteract: false,
    autoUpdate: true,
  });

  app.stage.addChild(model);

  const scale = 0.23;
  model.scale.set(scale);
  model.anchor.set(0.5, 0.5);
  model.x = W / 2;
  model.y = H * 1.35;

  try {
    model.motion('Idle', 0, PIXI.live2d.MotionPriority.IDLE);
  } catch (e) {}

  // Random expression cycling
  setInterval(() => {
    const exp = Math.floor(Math.random() * 8);
    try { model.expression(exp); } catch (e) {}
  }, 8000);

  // --- Volume-driven lip sync (Open-LLM-VTuber style) ---
  let currentMouth = 0;
  let targetMouth = 0;
  let volumeIndex = 0;
  let volumes = null;
  let sliceLength = 20;
  let playbackStart = 0;
  let audioCtx = null;
  let currentSource = null;

  // Ticker: interpolate mouth toward current volume target
  const origUpdate = model.internalModel.update.bind(model.internalModel);
  model.internalModel.update = function(dt, now) {
    origUpdate(dt, now);

    if (volumes && currentSource) {
      // Determine which volume slice we're in based on elapsed time
      const elapsed = (audioCtx.currentTime - playbackStart) * 1000;
      const idx = Math.floor(elapsed / sliceLength);
      if (idx < volumes.length) {
        targetMouth = volumes[idx];
      } else {
        targetMouth = 0;
      }
    } else {
      targetMouth = 0;
    }

    // Smooth toward target
    const speed = targetMouth > currentMouth ? 0.7 : 0.4;
    currentMouth += (targetMouth - currentMouth) * speed;
    if (currentMouth < 0.01) currentMouth = 0;

    this.coreModel.setParameterValueById('ParamA', currentMouth);
  };

  function stopAudio() {
    if (currentSource) {
      try { currentSource.stop(); } catch (e) {}
      currentSource = null;
    }
    volumes = null;
    targetMouth = 0;
  }

  function playPayload(payload) {
    stopAudio();

    if (!payload.audio || !payload.volumes || !payload.volumes.length) return;

    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();

    volumes = payload.volumes;
    sliceLength = payload.slice_length || 20;

    // Decode base64 WAV and play
    const raw = atob(payload.audio);
    const buf = new Uint8Array(raw.length);
    for (let i = 0; i < raw.length; i++) buf[i] = raw.charCodeAt(i);

    audioCtx.decodeAudioData(buf.buffer).then(audioBuffer => {
      const source = audioCtx.createBufferSource();
      source.buffer = audioBuffer;
      source.connect(audioCtx.destination);
      playbackStart = audioCtx.currentTime;
      source.start(0);
      currentSource = source;
      source.onended = () => {
        if (currentSource === source) {
          currentSource = null;
          volumes = null;
          targetMouth = 0;
        }
      };
    }).catch(err => console.error('[avatar] audio decode error:', err));
  }

  // Listen for messages from parent (deck)
  window.addEventListener('message', (e) => {
    if (!e.data) return;
    console.log('[avatar] message:', e.data.type);
    if (e.data.type === 'audio') playPayload(e.data);
    if (e.data.type === 'stop') stopAudio();
  });

  console.log('[avatar] model loaded, ready for audio payloads');
}

loadModel().catch(err => console.error('[avatar] loadModel failed:', err));

} // end PIXI guard
</script>
</body>
</html>
