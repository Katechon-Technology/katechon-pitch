<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Katechon Technology</title>
</head>
<body>

  <!-- Mobile Gate -->
  <div class="mobile-gate">
    <div class="logo">KATECHON TECHNOLOGY</div>
    <div class="msg">Our pitch deck works best on desktop</div>
    <div class="sub">Please visit on a laptop or desktop browser</div>
  </div>

  <!-- Start Overlay -->
  <div id="start-overlay">
    <div class="overlay-prompt">Press <kbd>Space</kbd> to begin</div>
  </div>

  <!-- Deck shell — slides are injected here by deck.js -->
  <div class="deck" id="deck-content"></div>

  <!-- Avatar Pet Mode -->
  <iframe id="avatar-pet"
    src="/avatar-pet.html"
    allow="autoplay"
    style="position:fixed;bottom:0;right:-250px;width:950px;height:100vh;border:none;background:transparent;z-index:200;pointer-events:none;"
  ></iframe>

  <div class="slide-counter"><span id="current">1</span> / <span id="total">1</span></div>

  <div class="nav">
    <button id="prev">&#8249;</button>
    <button id="next">&#8250;</button>
  </div>

  <div class="nav nav-left">
    <button id="avatar-toggle" title="Toggle avatar & voice">&#9787;</button>
  </div>

  <div class="progress" id="progress"></div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
